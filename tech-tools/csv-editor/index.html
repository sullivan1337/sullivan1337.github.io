<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSV Editor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="brand" id="brand-logo" title="Reset to home">
        <div class="brand-mark"><span>CSV</span></div>
        <div class="brand-text">
          <div class="brand-name">CSV Editor</div>
          <div class="brand-subtitle">Upload · Paste · Edit · Download</div>
        </div>
      </div>
      <div class="header-actions">
        <input type="file" id="file-input" accept=".csv,text/csv,text/plain" hidden />
        <button class="btn btn-outline" id="upload-btn">↗ Upload</button>
        <button class="btn btn-outline" id="reset-btn">Reset</button>
        <button class="btn btn-primary" id="download-btn" disabled>⬇ Download</button>
        <span class="muted" id="status-label">No data loaded</span>
      </div>
    </header>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-sm" id="add-row-btn" disabled>+ Row</button>
        <button class="btn btn-sm" id="add-col-btn" disabled>+ Column</button>
      </div>
      <div class="toolbar-right">
        <label class="checkbox-label">
          <input type="checkbox" id="header-row-checkbox" checked />
          First row is header
        </label>
        <span class="toolbar-label">Pretty JSON:</span>
        <select id="json-format-select">
          <option value="-1">None</option>
        </select>
      </div>
    </div>

    <main>
      <div class="grid-wrapper" id="grid-wrapper">
        <div class="empty-state" id="empty-state">
          <p>Upload a CSV file or paste data below</p>
          <div class="paste-inline-container">
            <textarea id="paste-inline-textarea" placeholder="Paste your CSV data here, or drag & drop a file..."></textarea>
            <div class="empty-actions">
              <button class="btn btn-primary" id="upload-empty-btn">Upload CSV</button>
              <button class="btn btn-outline" id="paste-apply-inline-btn">Apply pasted data</button>
            </div>
          </div>
        </div>
        <div class="grid-container" id="grid-container" style="display: none;">
          <div class="grid-scroll">
            <table class="csv-table" id="csv-table">
              <thead id="csv-thead"></thead>
              <tbody id="csv-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <div class="context-menu" id="context-menu"></div>

    <script src="app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSV Editor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="brand-mark" id="brand-mark" title="Reset to home"><span>CSV</span></div>
        <div class="brand-text">
          <div class="brand-name">CSV Editor</div>
          <div class="brand-subtitle">Upload · Paste · Edit · Download</div>
        </div>
      </div>
      <div class="header-actions">
        <input type="file" id="file-input" accept=".csv,text/csv,text/plain" hidden />
        <button class="btn btn-outline" id="upload-btn">↗ Upload</button>
        <button class="btn btn-outline btn-reset" id="reset-btn">Reset</button>
        <button class="btn btn-primary" id="download-btn" disabled>⬇ Download</button>
        <span class="muted" id="status-label">No data loaded</span>
      </div>
    </header>

    <div class="sticky-top" id="sticky-top">
    <div class="toolbar" id="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-sm" id="add-row-btn" disabled>+ Row</button>
        <button class="btn btn-sm" id="add-col-btn" disabled>+ Column</button>
      </div>
      <div class="toolbar-center">
        <span class="toolbar-label">Search:</span>
        <div class="search-input-wrap">
          <input type="text" id="search-input" class="search-input" placeholder="Search..." />
          <button type="button" class="search-clear" id="search-clear" title="Clear search">×</button>
        </div>
      </div>
      <div class="toolbar-right">
        <label class="checkbox-label">
          <input type="checkbox" id="word-wrap-checkbox" checked />
          Word wrap
        </label>
        <span class="toolbar-label">Pretty JSON:</span>
        <div class="json-dropdown">
          <button class="btn btn-sm json-dropdown-btn" id="json-dropdown-btn">None ▼</button>
          <div class="json-dropdown-panel" id="json-dropdown-panel"></div>
        </div>
        <label class="checkbox-label">
          <input type="checkbox" id="header-row-checkbox" checked />
          First row is header
        </label>
      </div>
    </div>
    <div class="table-header-bar" id="table-header-bar" style="display: none;">
      <div class="table-header-wrap" id="table-header-wrap">
        <table class="csv-table csv-header-table" id="csv-header-table">
          <colgroup id="csv-header-colgroup"></colgroup>
          <thead id="csv-thead"></thead>
        </table>
      </div>
    </div>
    </div>

    <main>
      <div class="grid-wrapper" id="grid-wrapper">
        <div class="empty-state" id="empty-state">
          <p>Upload a CSV file or paste data below</p>
          <div class="paste-inline-container">
            <textarea id="paste-inline-textarea" placeholder="Paste your CSV data here, or drag & drop a file..."></textarea>
            <div class="empty-actions">
              <button class="btn btn-primary" id="upload-empty-btn">Upload CSV</button>
              <button class="btn btn-outline" id="paste-apply-inline-btn">Apply pasted data</button>
            </div>
          </div>
        </div>
        <div class="grid-container" id="grid-container" style="display: none;">
          <div class="grid-body" id="grid-body">
            <div class="grid-table-wrap" id="grid-table-wrap">
              <table class="csv-table csv-body-table" id="csv-table">
                <colgroup id="csv-body-colgroup"></colgroup>
                <tbody id="csv-tbody"></tbody>
              </table>
            </div>
          </div>
          <div class="grid-h-scroll" id="grid-h-scroll">
            <div class="grid-h-spacer" id="grid-h-spacer"></div>
          </div>
        </div>
      </div>
    </main>

    <div class="context-menu" id="context-menu"></div>

    <script src="app.js"></script>
  </body>
</html>
